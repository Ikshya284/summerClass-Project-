<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="signup.css">
    <title>Food Management System Login</title>
</head>
<body>
    <section class="whole-section">
        <div class="container">
            <h2 class="logo">CookCraft</h2>
            <h1>Create an account</h1>
            <p>Cook. Save. Savor.</p>


            <form class="sign-up_form">
                <div class="input-box">
                    <input type="text" placeholder="Enter your username " required>
                </div>


                <div class="input-box">
                    <input type="email" placeholder="Enter your email" required>

                </div>
            
                <div class="input-box">
                    <input type="password" placeholder="Enter your password" required>
                    <i class="fa-solid fa-eye-slash"></i>
                </div>

                <div class="input-box">
                    <input type="password" placeholder="Confirm password" required>
                    <i class="fa-solid fa-eye-slash"></i>
                </div>

                <div class="check-box">
                    <div class="terms">
                        <input type="checkbox">
                        <label><a href="#">Accept terms & Conditions</a></label>
                    </div>
                </div>

                <button  type="submit" class="Sign">Sign Up</button>
                <div class="or">or</div><br>

                <button type="button" class="google-btn">
                <img src="Images/google.png" alt="Google" class="google-icon">
                <span>Sign up using Google</span>
                </button>

                <p class="signup-text">Already have an account? <b><a href="#login.html">Sign in</a></b></p>

            </form>


        </div>

        <div class="image-section">
            <video autoplay muted loop id="bg-video" class="video">
                <source src="Images/vdo.mp4" type="video/mp4">
            </video>
        </div>

        <script>
            const video = document.getElementById("bg-video");
            video.playbackRate = 0.25;
        </script>

    </section>


</body>
</html>
